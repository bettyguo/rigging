name: pages

on:
  # Run on every push to main so the site stays in sync.
  # No path filter — we want a manual edit anywhere to be able to trigger
  # a redeploy, and the build is fast.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab. Useful for the first deploy.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deploy at a time; queue new pushes behind the current one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `enablement: true` auto-creates the Pages site on the first run with
      # source = GitHub Actions, so the user does not have to flip a Settings
      # toggle. Requires `permissions: pages: write` (set above).
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
