<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Rigging — a harness is for one agent; rigging is for the fleet.">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="sailA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="sailB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="60%" stop-color="#e0f2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="knot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- starfield with twinkle -->
  <g fill="#e2e8f0">
    <circle cx="60" cy="40" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="80" r="0.6"><animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="40" r="0.8"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="110" r="0.5"><animate attributeName="opacity" values="1;0.2;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="60" r="0.7"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="30" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="90" r="0.5"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="50" r="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="100" r="0.7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="40" r="0.5"><animate attributeName="opacity" values="1;0.4;1" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="70" r="0.9"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="30" r="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="90" r="0.7"><animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="60" r="0.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="80"  cy="160" r="0.4"><animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="180" r="0.5"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="180" r="0.4"><animate attributeName="opacity" values="1;0.4;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="160" r="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- moon halo (slow soft pulse) -->
  <circle cx="990" cy="120" r="120" fill="url(#moon)">
    <animate attributeName="r" values="118;124;118" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="990" cy="120" r="38" fill="#f1f5f9" opacity="0.95"/>

  <!-- distant ship silhouette -->
  <g opacity="0.45" transform="translate(180,260) scale(0.55)">
    <line x1="40" y1="0" x2="40" y2="120" stroke="#94a3b8" stroke-width="2"/>
    <path d="M40 10 L0 90 L40 90 Z" fill="#475569"/>
    <path d="M40 10 L80 90 L40 90 Z" fill="#64748b"/>
    <path d="M-10 110 Q40 130 90 110 L80 124 Q40 138 0 124 Z" fill="#1f2937"/>
  </g>

  <!-- MAIN SHIP — gentle sway (translate + tiny rotate) -->
  <g transform="translate(420,80)" filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,4; 0,-2; 0,0"
        dur="7s" repeatCount="indefinite" />

      <!-- mast -->
      <line x1="180" y1="0" x2="180" y2="280" stroke="#cbd5e1" stroke-width="3"/>
      <!-- yards -->
      <line x1="80" y1="80" x2="280" y2="80" stroke="#94a3b8" stroke-width="2"/>
      <line x1="100" y1="200" x2="260" y2="200" stroke="#94a3b8" stroke-width="2"/>
      <!-- sails -->
      <path d="M180 10 L80 80 L180 80 Z" fill="url(#sailA)" stroke="#e2e8f0" stroke-width="1"/>
      <path d="M180 10 L280 80 L180 80 Z" fill="url(#sailB)" stroke="#475569" stroke-width="1"/>
      <path d="M180 85 L100 200 L180 200 Z" fill="url(#sailA)" stroke="#e2e8f0" stroke-width="1" opacity="0.95"/>
      <path d="M180 85 L260 200 L180 200 Z" fill="url(#sailB)" stroke="#475569" stroke-width="1" opacity="0.95"/>

      <!-- rigging lines: the load-bearing web -->
      <g stroke="#38bdf8" stroke-width="1.1" opacity="0.85">
        <line x1="180" y1="0" x2="80" y2="80"/>
        <line x1="180" y1="0" x2="280" y2="80"/>
        <line x1="180" y1="0" x2="100" y2="200"/>
        <line x1="180" y1="0" x2="260" y2="200"/>
        <line x1="180" y1="0" x2="60" y2="270"/>
        <line x1="180" y1="0" x2="300" y2="270"/>
        <line x1="180" y1="80" x2="100" y2="200"/>
        <line x1="180" y1="80" x2="260" y2="200"/>
        <line x1="180" y1="200" x2="60" y2="270"/>
        <line x1="180" y1="200" x2="300" y2="270"/>
      </g>

      <!-- rope knots (glow halo + pulse) -->
      <g>
        <circle cx="180" cy="0"   r="10" fill="url(#knot)"><animate attributeName="r" values="6;12;6" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle cx="180" cy="80"  r="8"  fill="url(#knot)"><animate attributeName="r" values="5;10;5" dur="3.2s" repeatCount="indefinite"/></circle>
        <circle cx="180" cy="200" r="8"  fill="url(#knot)"><animate attributeName="r" values="5;10;5" dur="3.6s" repeatCount="indefinite"/></circle>
        <circle cx="60"  cy="270" r="7"  fill="url(#knot)"><animate attributeName="r" values="4;8;4"  dur="4s"   repeatCount="indefinite"/></circle>
        <circle cx="300" cy="270" r="7"  fill="url(#knot)"><animate attributeName="r" values="4;8;4"  dur="3.4s" repeatCount="indefinite"/></circle>
      </g>
      <g fill="#fbbf24">
        <circle cx="180" cy="0" r="3"/>
        <circle cx="180" cy="80" r="2.5"/>
        <circle cx="180" cy="200" r="2.5"/>
        <circle cx="60" cy="270" r="2.5"/>
        <circle cx="300" cy="270" r="2.5"/>
      </g>

      <!-- hull -->
      <path d="M30 280 Q180 320 330 280 L300 320 Q180 348 60 320 Z" fill="url(#hull)" stroke="#334155" stroke-width="1.5"/>
      <rect x="120" y="295" width="14" height="10" fill="#fde68a" opacity="0.8" rx="1"/>
      <rect x="160" y="295" width="14" height="10" fill="#fde68a" opacity="0.8" rx="1"/>
      <rect x="200" y="295" width="14" height="10" fill="#fde68a" opacity="0.8" rx="1"/>
      <rect x="240" y="295" width="14" height="10" fill="#fde68a" opacity="0.8" rx="1"/>
    </g>
  </g>

  <!-- sea (drifting wave lines) -->
  <rect x="0" y="410" width="1200" height="70" fill="url(#sea)"/>
  <g stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.7">
    <path d="M-120 412 Q-60 408 0 412 T120 412 T240 412 T360 412 T480 412 T600 412 T720 412 T840 412 T960 412 T1080 412 T1200 412 T1320 412">
      <animateTransform attributeName="transform" type="translate" values="0 0; 120 0; 0 0" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>
  <g stroke="#0ea5e9" stroke-width="1" fill="none" opacity="0.5">
    <path d="M-160 426 Q-80 422 0 426 T160 426 T320 426 T480 426 T640 426 T800 426 T960 426 T1120 426 T1280 426">
      <animateTransform attributeName="transform" type="translate" values="0 0; -160 0; 0 0" dur="13s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
