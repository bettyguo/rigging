<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Rigging — for the fleet">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="sailA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="sailB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ship at right -->
  <g transform="translate(720,120)">
    <line x1="180" y1="0" x2="180" y2="320" stroke="#cbd5e1" stroke-width="3"/>
    <path d="M180 10 L80 100 L180 100 Z" fill="url(#sailA)"/>
    <path d="M180 10 L280 100 L180 100 Z" fill="url(#sailB)"/>
    <path d="M180 110 L100 240 L180 240 Z" fill="url(#sailA)" opacity="0.95"/>
    <path d="M180 110 L260 240 L180 240 Z" fill="url(#sailB)" opacity="0.95"/>
    <g stroke="#38bdf8" stroke-width="1.1" opacity="0.9">
      <line x1="180" y1="0" x2="80" y2="100"/>
      <line x1="180" y1="0" x2="280" y2="100"/>
      <line x1="180" y1="0" x2="100" y2="240"/>
      <line x1="180" y1="0" x2="260" y2="240"/>
      <line x1="180" y1="0" x2="60" y2="320"/>
      <line x1="180" y1="0" x2="300" y2="320"/>
    </g>
    <path d="M30 320 Q180 360 330 320 L300 360 Q180 388 60 360 Z" fill="#1f2937" stroke="#334155" stroke-width="1.5"/>
  </g>

  <text x="80" y="220"  fill="#94a3b8" font-family="ui-monospace, monospace" font-size="24" letter-spacing="6">RIGGING · v0</text>
  <text x="80" y="320"  fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="76">If Harness is</text>
  <text x="80" y="396"  fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="76">for one agent,</text>
  <text x="80" y="478"  fill="url(#grad)" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="76">Rigging is for the fleet.</text>
  <text x="80" y="540"  fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">Signed cards · delegation contracts · mechanical blame.</text>
</svg>
