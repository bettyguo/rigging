<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" width="1100" height="460" role="img" aria-label="Cost attribution waterfall — A → B → C with explicit sub-budgets">
  <defs>
    <linearGradient id="barA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="barC" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="overrun" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <style>
      .h    { fill:#f1f5f9; font: 700 22px ui-sans-serif, system-ui, sans-serif; }
      .sub  { fill:#94a3b8; font: 13px ui-monospace, monospace; }
      .axis { stroke:#334155; stroke-width:1; }
      .axl  { fill:#64748b; font: 11px ui-monospace, monospace; }
      .lbl  { fill:#f8fafc; font: 700 14px ui-monospace, monospace; }
      .pill { fill:#0f172a; stroke:#334155; rx:6; ry:6; }
      .pillT{ fill:#e2e8f0; font: 600 11px ui-monospace, monospace; }
    </style>
  </defs>

  <rect width="1100" height="460" fill="#020617"/>
  <text x="40" y="42" class="h">Cost attribution · A → B → C · sub-budgets compose</text>
  <text x="40" y="64" class="sub">B carves C's sub-budget from its own allocation. C overruns. <tspan fill="#fde68a">A's ledger is untouched.</tspan></text>

  <!-- y axis grid -->
  <g class="axis">
    <line x1="120" y1="120" x2="120" y2="380"/>
    <line x1="120" y1="380" x2="1060" y2="380"/>
  </g>
  <g class="axl">
    <text x="60" y="385">$0.00</text>
    <text x="60" y="320">$0.25</text>
    <text x="60" y="255">$0.50</text>
    <text x="60" y="190">$0.75</text>
    <text x="60" y="125">$1.00</text>
  </g>
  <g stroke="#1e293b" stroke-dasharray="4 4">
    <line x1="120" y1="320" x2="1060" y2="320"/>
    <line x1="120" y1="255" x2="1060" y2="255"/>
    <line x1="120" y1="190" x2="1060" y2="190"/>
    <line x1="120" y1="125" x2="1060" y2="125"/>
  </g>

  <!-- A column: budget=1.00 -->
  <g transform="translate(180,0)">
    <rect x="0" y="125" width="160" height="255" fill="url(#barA)" rx="8"/>
    <rect x="0" y="125" width="160" height="6" fill="#bae6fd"/>
    <text x="80" y="100" text-anchor="middle" class="lbl">A · budget $1.00</text>
    <text x="80" y="400" text-anchor="middle" class="sub">used $0.05  ·  remaining $0.95</text>
    <rect class="pill" x="20" y="408" width="120" height="22"/>
    <text x="40" y="423" class="pillT">unaffected ✓</text>
  </g>

  <!-- B column: sub-budget=0.50 from A -->
  <g transform="translate(440,0)">
    <rect x="0" y="255" width="160" height="125" fill="url(#barB)" rx="8"/>
    <rect x="0" y="255" width="160" height="6" fill="#a5f3fc"/>
    <text x="80" y="100" text-anchor="middle" class="lbl">B · sub-budget $0.50</text>
    <text x="80" y="240" text-anchor="middle" class="sub">carved from A</text>
    <text x="80" y="400" text-anchor="middle" class="sub">used $0.13  ·  remaining $0.37</text>
    <rect class="pill" x="20" y="408" width="120" height="22"/>
    <text x="40" y="423" class="pillT">on budget ✓</text>
  </g>

  <!-- C column: sub-budget=0.20 from B; overruns -->
  <g transform="translate(700,0)">
    <rect x="0" y="328" width="160" height="52" fill="url(#barC)" rx="8"/>
    <rect x="0" y="328" width="160" height="6" fill="#fde68a"/>
    <!-- overrun delta -->
    <rect x="0" y="294" width="160" height="34" fill="url(#overrun)" rx="6">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="100" text-anchor="middle" class="lbl">C · sub-budget $0.20</text>
    <text x="80" y="240" text-anchor="middle" class="sub">carved from B</text>
    <text x="80" y="400" text-anchor="middle" class="sub">used $0.33  ·  <tspan fill="#fecaca">+$0.13 overrun</tspan></text>
    <rect class="pill" x="10" y="408" width="140" height="22" fill="#450a0a" stroke="#ef4444"/>
    <text x="22" y="423" fill="#fecaca" font-family="ui-monospace, monospace" font-weight="700" font-size="11">BudgetOverrun</text>
  </g>

  <!-- Arrows: A→B→C -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowC)">
    <path d="M345 250 C 400 250, 400 290, 440 290"/>
    <path d="M605 320 C 660 320, 660 350, 700 350"/>
  </g>
  <defs>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="368" y="240" class="sub">A→B</text>
  <text x="628" y="310" class="sub">B→C</text>
</svg>
