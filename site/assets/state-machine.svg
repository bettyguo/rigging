<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600" role="img" aria-label="The contract state machine">
  <defs>
    <linearGradient id="sProposed" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sActive" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <linearGradient id="sFulfilled" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="sRejected" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="sVoided" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <style>
      .h       { fill:#f1f5f9; font: 700 24px ui-sans-serif, system-ui, sans-serif; }
      .sub     { fill:#94a3b8; font: 13px ui-monospace, monospace; }
      .name    { fill:#f8fafc; font: 700 20px ui-sans-serif, system-ui, sans-serif; }
      .desc    { fill:#cbd5e1; font: 12px ui-monospace, monospace; }
      .arrLbl  { fill:#cbd5e1; font: 600 12px ui-monospace, monospace; }
      .arrLblBg{ fill:#020617; }
      .tagOk   { fill:#a7f3d0; font: 700 12px ui-monospace, monospace; }
      .tagBad  { fill:#fecaca; font: 700 12px ui-monospace, monospace; }
      .tagWarn { fill:#fde68a; font: 700 12px ui-monospace, monospace; }
    </style>
    <marker id="arrSM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>

    <!-- shape symbols (work in every renderer) -->
    <symbol id="okMark" viewBox="0 0 24 24" width="20" height="20">
      <circle cx="12" cy="12" r="11" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
      <path d="M7 12 L11 16 L17 8" stroke="#a7f3d0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="badMark" viewBox="0 0 24 24" width="20" height="20">
      <circle cx="12" cy="12" r="11" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
      <path d="M8 8 L16 16 M16 8 L8 16" stroke="#fecaca" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="warnMark" viewBox="0 0 24 24" width="20" height="20">
      <path d="M12 3 L22 21 L2 21 Z" fill="#78350f" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>
      <line x1="12" y1="10" x2="12" y2="15" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="12" cy="18" r="1.3" fill="#fde68a"/>
    </symbol>
  </defs>

  <rect width="1280" height="600" fill="#020617"/>
  <text x="40" y="44" class="h">Contract state machine</text>
  <text x="40" y="68" class="sub">Three terminal states. No edge labelled "silently retry".</text>

  <!--
       LAYOUT
       column x:    100      460         860         (centres at 230, 590, 1020)
       row y:       150-270  150-270     50-150   <- fulfilled
                                          260-360  <- rejected
                                          470-570  <- voided
  -->

  <!-- start dot -->
  <circle cx="60" cy="210" r="7" fill="#64748b"/>
  <line x1="68" y1="210" x2="98" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrSM)"/>

  <!-- proposed (left) -->
  <g transform="translate(100,150)">
    <rect width="280" height="120" rx="14" fill="url(#sProposed)" stroke="#475569"/>
    <text x="24" y="40" class="name">proposed</text>
    <text x="24" y="74" class="desc">caller-signed contract</text>
    <text x="24" y="96" class="desc">awaiting callee acceptance</text>
  </g>

  <!-- active (centre) -->
  <g transform="translate(460,150)">
    <rect width="280" height="120" rx="14" fill="url(#sActive)" stroke="#0ea5e9"/>
    <text x="24" y="40" class="name">active</text>
    <text x="24" y="74" class="desc">callee accepted</text>
    <text x="24" y="96" class="desc">execute &#183; verify &#183; cost-debit</text>
  </g>

  <!-- fulfilled (top right) -->
  <g transform="translate(860,50)">
    <rect width="360" height="100" rx="14" fill="url(#sFulfilled)" stroke="#10b981"/>
    <use href="#okMark" x="24" y="22"/>
    <text x="58" y="40" class="name" fill="#a7f3d0">fulfilled</text>
    <text x="24" y="76" class="desc">execute &#43; verify both succeeded</text>
  </g>

  <!-- rejected (mid right) -->
  <g transform="translate(860,260)">
    <rect width="360" height="100" rx="14" fill="url(#sRejected)" stroke="#ef4444"/>
    <use href="#badMark" x="24" y="22"/>
    <text x="58" y="40" class="name" fill="#fecaca">rejected</text>
    <text x="24" y="76" class="desc">callee declined &#183; verifier rejected</text>
  </g>

  <!-- voided (bottom right) -->
  <g transform="translate(860,470)">
    <rect width="360" height="100" rx="14" fill="url(#sVoided)" stroke="#f59e0b"/>
    <use href="#warnMark" x="24" y="22"/>
    <text x="58" y="40" class="name" fill="#fde68a">voided</text>
    <text x="24" y="76" class="desc">expired &#183; overrun &#183; unreachable &#183; sig-invalid</text>
  </g>

  <!-- ===== arrows ===== -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <!-- proposed -> active (horizontal) -->
    <line x1="380" y1="210" x2="456" y2="210" marker-end="url(#arrSM)"/>

    <!-- proposed -> rejected (down-right arc, plenty of clearance) -->
    <path d="M 240 270 L 240 410 L 856 410 L 856 310" marker-end="url(#arrSM)"/>

    <!-- proposed -> voided (further-down arc) -->
    <path d="M 200 270 L 200 540 L 856 540 L 856 520" marker-end="url(#arrSM)"/>

    <!-- active -> fulfilled (up-right) -->
    <path d="M 740 180 L 800 180 L 800 100 L 856 100" marker-end="url(#arrSM)"/>

    <!-- active -> rejected (right then down) -->
    <path d="M 740 210 L 820 210 L 820 310 L 856 310" marker-end="url(#arrSM)"/>

    <!-- active -> voided (right then down further) -->
    <path d="M 740 240 L 840 240 L 840 520 L 856 520" marker-end="url(#arrSM)"/>
  </g>

  <!-- ===== arrow labels (with bg pads so they sit cleanly on top of paths) ===== -->
  <!-- Each label = rect + text. Width is text-length × 7px + 16 padding. -->
  <g>
    <!-- accept: above proposed→active arrow -->
    <rect x="400" y="184" width="56" height="20" rx="6" fill="#020617"/>
    <text x="408" y="198" class="arrLbl">accept</text>

    <!-- callee rejects pre-accept: along the down-then-right path from proposed -->
    <rect x="276" y="402" width="240" height="20" rx="6" fill="#020617"/>
    <text x="284" y="416" class="arrLbl">callee rejects pre-accept</text>

    <!-- expires before accept -->
    <rect x="276" y="532" width="216" height="20" rx="6" fill="#020617"/>
    <text x="284" y="546" class="arrLbl">expires before accept</text>

    <!-- verify accept -->
    <rect x="746" y="160" width="106" height="20" rx="6" fill="#020617"/>
    <text x="754" y="174" class="arrLbl">verify accept</text>

    <!-- verifier rejects -->
    <rect x="746" y="270" width="120" height="20" rx="6" fill="#020617"/>
    <text x="754" y="284" class="arrLbl">verifier rejects</text>

    <!-- overrun / expiry / unreachable -->
    <rect x="746" y="380" width="230" height="20" rx="6" fill="#020617"/>
    <text x="754" y="394" class="arrLbl">overrun &#183; expiry &#183; unreachable</text>
  </g>

  <!-- legend -->
  <text x="40" y="586" class="sub">Terminal states are immutable. Retries are first-class events with their own contracts and identifiers.</text>
</svg>
